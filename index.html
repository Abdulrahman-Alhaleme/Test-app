<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#3bab4f" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="icon-192.png" />
<title>الرئيسية</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --green:#3bab4f;
    --green-dark:#2e853e;
    --bg:#f2f3f5;
    --card:#ffffff;
    --text-dark:#202428;
    --text-gray:#8b9097;
    --shadow:0 8px 20px rgba(20,40,30,0.07);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family:'Tajawal','Segoe UI',sans-serif;
    background:var(--bg);
    display:flex;
    justify-content:center;
  }
  .app{
    width:100%;
    max-width:440px;
    min-height:100vh;
    position:relative;
    padding:14px 0 96px;
  }

  /* ---------- Hero ---------- */
  .hero{
    margin:0 16px;
    height:260px;
    border-radius:22px;
    overflow:hidden;
    position:relative;
    box-shadow:var(--shadow);
  }
  .hero-img{width:100%;height:100%;object-fit:cover;display:block;}
  .hero-overlay{
    position:absolute;inset:0;
    background:linear-gradient(to top, rgba(8,12,10,0.39) 0%, rgba(8,12,10,0.13) 48%, rgba(8,12,10,0) 78%);
  }
  .hero-text{
    position:absolute;right:22px;left:22px;bottom:18px;
    color:#fff;text-align:center;
  }
  .hero-greeting{font-size:29px;font-weight:800;text-shadow:0 1px 4px rgba(0,0,0,0.45);}
  .hero-name{font-size:15px;font-weight:500;margin-top:6px;color:rgba(255,255,255,0.92);text-shadow:0 1px 4px rgba(0,0,0,0.45);}

  /* ---------- Notification card ---------- */
  .notif-card{
    margin:16px 16px 0;
    background:var(--card);
    border-radius:18px;
    box-shadow:var(--shadow);
    padding:15px 18px;
    display:flex;
    align-items:center;
    justify-content:flex-start;
    gap:14px;
  }
  .notif-text{text-align:right;}
  .notif-title{font-weight:700;font-size:15px;color:var(--green);}
  .notif-desc{font-size:12.5px;color:var(--text-gray);margin-top:4px;}
  .notif-icon{
    width:46px;height:46px;border-radius:15px;
    background:var(--green);
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;
  }

  /* ---------- Grid ---------- */
  .grid{
    margin:16px 16px 0;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:14px;
  }
  .grid-card{
    background:var(--card);
    border-radius:18px;
    box-shadow:var(--shadow);
    padding:30px 10px 24px;
    display:flex;flex-direction:column;align-items:center;gap:14px;
    text-align:center;
    color:var(--green);
    cursor:pointer;
    transition:transform .15s ease;
  }
  .grid-card:active{transform:scale(0.96);}
  .grid-label{font-weight:700;font-size:15px;color:var(--text-dark);}

  /* ---------- Bottom nav ---------- */
  .bottom-nav{
    position:fixed;bottom:0;left:0;right:0;
    margin:0 auto;
    width:100%;max-width:440px;
    background:var(--card);
    display:flex;
    justify-content:space-around;
    align-items:flex-end;
    padding:10px 0 10px;
    border-radius:24px 24px 0 0;
    box-shadow:0 -6px 18px rgba(0,0,0,0.06);
  }
  .nav-item{
    display:flex;flex-direction:column;align-items:center;gap:4px;
    font-size:11px;color:var(--text-gray);
    background:none;border:none;font-family:inherit;
    cursor:pointer;
  }
  .nav-icon{
    width:40px;height:40px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    color:var(--text-gray);
  }
  .nav-item.active{color:var(--green);font-weight:700;}
  .nav-item.active .nav-icon{
    background:var(--green);color:#fff;
    margin-top:-22px;
    box-shadow:0 6px 14px rgba(59,171,79,0.35);
  }

</style>
</head>
<body>

<div class="app">

  <!-- Hero -->
  <div class="hero">
    
    <img src="hero.png" alt="صورة الجامعة" class="hero-img">
    <div class="hero-overlay"></div>
    <div class="hero-text">
      <div class="hero-greeting">أهلا</div>
      <div class="hero-name">عبدالرحمن عماد عبدالرحمن الحليمي</div>
    </div>
  </div>

  <!-- Notification -->
  <div class="notif-card">
    <div class="notif-icon">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="6" width="20" height="12" rx="2"/>
        <circle cx="12" cy="12" r="3"/>
        <path d="M6 9v.01M18 15v.01"/>
      </svg>
    </div>
    <div class="notif-text">
      <div class="notif-title">تنبيهاتي</div>
      <div class="notif-desc">لا مانع من دخول الطالب للإمتحان</div>
    </div>
  </div>

  <!-- Grid -->
  <div class="grid">
    <div class="grid-card">
      <svg width="58" height="58" viewBox="0 0 24 24">
        <path d="M12 3.2 2.4 8.2c-.5.27-.5 1 0 1.27L12 14.5l9.6-5.03c.5-.27.5-1 0-1.27L12 3.2Z" fill="currentColor"/>
        <path d="M6.5 11.6V16c0 1.66 2.46 3 5.5 3s5.5-1.34 5.5-3v-4.4L12 14.5l-5.5-2.9Z" fill="currentColor" opacity="0.78"/>
        <path d="M20.2 9.6v5.6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        <circle cx="20.2" cy="16.4" r="1.3" fill="currentColor"/>
      </svg>
      <div class="grid-label">أكاديمي</div>
    </div>
    <div class="grid-card">
      <svg width="58" height="58" viewBox="0 0 24 24">
        <rect x="2.3" y="3.5" width="19.4" height="14" rx="2.4" fill="currentColor" opacity="0.14"/>
        <rect x="2.3" y="3.5" width="19.4" height="14" rx="2.4" fill="none" stroke="currentColor" stroke-width="1.5"/>
        <path d="M8.2 14.2v-3.4a3 3 0 0 1 3-3v3.4l-3 3Z" fill="currentColor"/>
        <circle cx="11.2" cy="10.8" r="3" fill="none" stroke="currentColor" stroke-width="1.3"/>
        <rect x="15" y="11.2" width="2" height="3" fill="currentColor"/>
        <rect x="18" y="9" width="2" height="5.2" fill="currentColor"/>
        <path d="M9 20.5h6M12 17.5v3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
      </svg>
      <div class="grid-label">لوحة التحكم</div>
    </div>
    <div class="grid-card">
      <svg width="58" height="58" viewBox="0 0 24 24">
        <circle cx="10.5" cy="10.5" r="6.5" fill="none" stroke="currentColor" stroke-width="1.8"/>
        <path d="M15.3 15.3l4.7 4.7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
      <div class="grid-label">طلباتي</div>
    </div>
    <div class="grid-card">
      <svg width="58" height="58" viewBox="0 0 24 24">
        <path d="M4.6 5.6h11.8L19.4 9v9.4a1 1 0 0 1-1 1H4.6a1 1 0 0 1-1-1V6.6a1 1 0 0 1 1-1Z" fill="currentColor" opacity="0.16" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>
        <path d="M16.4 5.6V9h3" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>
        <circle cx="8.6" cy="11.4" r="1.9" fill="currentColor"/>
        <path d="M5.6 16.6c.4-1.9 1.8-3 3-3s2.6 1.1 3 3" stroke="currentColor" stroke-width="1.3" fill="none" stroke-linecap="round"/>
        <path d="M13.6 10.6h3.4M13.6 13.4h2.4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
      </svg>
      <div class="grid-label">بطاقتي الجامعية</div>
    </div>
  </div>

  <!-- Bottom nav -->
  <div class="bottom-nav">
    <button class="nav-item active" onclick="setActive(this)">
      <span class="nav-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 11.5 12 4l8 7.5"/>
          <path d="M6 10v9a1 1 0 0 0 1 1h3v-5h4v5h3a1 1 0 0 0 1-1v-9"/>
        </svg>
      </span>
      <span>الرئيسية</span>
    </button>
    <button class="nav-item" onclick="setActive(this)">
      <span class="nav-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 16v-5a6 6 0 1 0-12 0v5l-1.5 2h15L18 16Z"/>
          <path d="M10 20a2 2 0 0 0 4 0"/>
        </svg>
      </span>
      <span>التنبيهات</span>
    </button>
    <button class="nav-item" onclick="location.href='settings.html'">
      <span class="nav-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 13a7.97 7.97 0 0 0 0-2l2-1.2-2-3.4-2.3.9a8 8 0 0 0-1.7-1l-.3-2.3h-4l-.3 2.3a8 8 0 0 0-1.7 1l-2.3-.9-2 3.4 2 1.2a8 8 0 0 0 0 2l-2 1.2 2 3.4 2.3-.9a8 8 0 0 0 1.7 1l.3 2.3h4l.3-2.3a8 8 0 0 0 1.7-1l2.3.9 2-3.4-2-1.2Z"/>
        </svg>
      </span>
      <span>الإعدادات</span>
    </button>
  </div>


</div>

<script>
  function setActive(el){
    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
    el.classList.add('active');
  }
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    });
  }
</script>

</body>
</html>
